################
### MONITORS ###
################
monitor=DP-1,1920x1080@144,auto,auto


###################
### MY PROGRAMS ###
###################
$terminal = ghostty
$fileManager = yazi
$menu = rofi -show run
# $browser = zen-browser
$browser = firefox
$taskManager = btop
$colorpicker = hyprpicker
$note = obsidian


#################
### AUTOSTART ###
#################
# exec-once = hyprctl setcursor "Banana" 40
# exec = gsettings set org.gnome.desktop.interface cursor-theme "Banana"
# exec = gsettings set org.gnome.desktop.interface cursor-size 40

exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hyprpaper & waybar

# source = ~/.config/hypr/hyprvim/init.conf
# exec-once = caelestia shell & hyprpaper
# exec-once = hypridle
exec-once = [workspace 1 silent] $browser
# exec-once = [workspace 2] $terminal -e tmux-session
exec-once = [workspace 2] $terminal
# Obsidian 
# exec-once = [workspace 3] $note

# $OCR4Linux = ~/Downloads/OCR4Linux/OCR4Linux.sh
$OCR4Linux_ENG = ~/Downloads/OCR4Linux/OCR4Linux.sh --lang eng

# bind = $mainMod SHIFT, T, exec, $OCR4Linux


#############################
### Windows Rules ###
#############################

#windowrule = opacity 1 override 1 override 1.0 override, class:Code # For Overriding Opacity in VsCode
#windowrule = opacity 1 override 1 override 1.0 override, class:zen # For Overriding Opacity in Zen
# --- Workspace Assignments ---

# Workspace 1: Browsers
windowrule = match:class zen, workspace 1
windowrule = match:class google-chrome, workspace 1
windowrule = match:class firefox, workspace 1

# Workspace 2: Terminals
windowrule = match:class kitty, workspace 2
windowrule = match:class com.mitchellh.ghostty, workspace 2

# Workspace 3: Productivity & Dev
windowrule = match:class obsidian, workspace 3
windowrule = match:class Code, workspace 3
windowrule = match:class discord, workspace 3

# Workspace 4: Media & Tools (Silent)
windowrule = match:class hyprland-dialog, workspace 4
windowrule = match:class mpv, workspace 4 silent
windowrule = match:class Docker Desktop, workspace 4
windowrule = match:class GitKraken, workspace 4

# --- Visual Rules ---

# Opacity
# windowrule = match:class zen, opacity 0.85 override

# Layer Rules (Animations)

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_SIZE,8
env = HYPRCURSOR_SIZE,8


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 3
    gaps_out = 6

    border_size = 2

    # col.active_border = rgb(8aadf4) rgb(24273A) rgb(24273A) rgb(8aadf4) 30deg
    # col.inactive_border = rgb(24273A) rgb(24273A) rgb(24273A) rgb(27273A) 90deg

    col.active_border = rgb(f5c2e7) rgb(000000) 45deg
    col.inactive_border = rgb(24273A)

    resize_on_border = true
    extend_border_grab_area = 30
    hover_icon_on_border = true
    resize_corner = 5
    allow_tearing = false


    layout = scrolling
}

# plugin {
#     hyprexpo {
#         columns = 3
#         gap_size = 5
#         # bg_col = rgb(111111)
#         workspace_method = center current # [center/first] [workspace] e.g. first 1 or center m+1
#
#         # gesture_distance = 2 # how far is the "max" for the gesture
#     }
# }

scrolling {
  fullscreen_on_one_column = true
  focus_fit_method = 1
  column_width = 0.6
  follow_focus = 1
  direction = left
  # explicit_column_widths = 0.3, 0.5, 0.65, 0.8, 0.985, 1.0
}
# bind = SUPER, g, hyprexpo:expo, toggle # Good but not for me
$mainMod = SUPER
# bind = $mainMod, period, layoutmsg, move +col
# bind = $mainMod, slash, layoutmsg, move -col
bind = $mainMod, equal, layoutmsg, colresize +0.1
bind = $mainMod, minus, layoutmsg, colresize -0.1
bind = $mainMod, comma, layoutmsg, swapcol l
bind = $mainMod, period, layoutmsg, swapcol r
# bind = $mainMod, p, layoutmsg, promote
# bind = $mainMod, bracketright, layoutmsg, colresize +conf
# bind = $mainMod, bracketleft, layoutmsg, colresize -conf

decoration {
  dim_special = 0.2
    rounding = 0
    active_opacity = 1
    inactive_opacity = 1

    blur {
      enabled = true
        size = 5
        popups = true
        passes = 4
        new_optimizations = true
        vibrancy = 0.4
        ignore_opacity = true
        special = true
    }

  shadow {
    enabled = false
      range = 300
      render_power = 3
      color = rgba(1a1a1aaf)
      offset =  10 10
# scale = 0.95
      ignore_window = true
  }

}


#####################
### Animations    ###
#####################

# animations {
#     enabled = true
#
#     # Bezier curves
#     bezier = smooth, 0.25, 0.8, 0.25, 1.0
#     bezier = overshot, 0.34, 1.56, 0.64, 1.0
#
#     # Window animations
#     animation = windows, 1, 6, overshot, slidevert
#     animation = windowsIn, 1, 6, smooth, slidevert
#     animation = windowsOut, 1, 5, smooth, slidevert
#
#     # Fade for polish
#     animation = fade, 1, 5, smooth
#     animation = fadeDim, 1, 5, smooth
#
#     # Workspace animations (UP/DOWN)
#     animation = workspaces, 1, 6, smooth, slidevert
#
#     # Special workspace (scratchpad)
#     animation = specialWorkspace, 1, 6, overshot, slidevert
# }

animations {
  enabled = true
    bezier = easeOutBack, 0.34, 1.56, 0.64, 1
    bezier = sideDown, 0.3, 1, 0.7, 1
    bezier = ease, 0.25, 0.1, 0.25, 1.0


    animation = windowsIn, 5, 2.5, easeOutBack, popin 90%
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear, 0, 0, 1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1.0
    bezier = quick, 0.15, 0, 0.1, 1

# General window animations
    animation = windowsIn, 1, 2.5, easeOutQuint, slide
    animation = windowsOut, 1, 2.5,sideDown, slide
    animation = windows, 1, 5.0, easeOutQuint

# Fade animations
    animation = fadeIn, 1, 2.0, almostLinear
    animation = fadeOut, 1, 1.8, almostLinear
    animation = fade, 1, 2.8, quick

# Layer animations like dunst, rofi and hyprpaper
    animation = layers,        1, 4, ease, slide
    animation = layersOut,     1, 4, ease, fade


# Workspace animations
    animation = workspaces, 1, 2.0, easeInOutCubic, slide
    animation = workspacesIn, 1, 3.0, easeInOutCubic, slide
    animation = workspacesOut, 1, 3.0, easeInOutCubic, slide

    animation = fade, 1, 8, ease
}

dwindle {
  pseudotile = true
    preserve_split = true
}

master {
  new_status = inherit
    new_on_top = true
    new_on_active = true
    smart_resizing = true
}

#############
### INPUT ###
#############

input {
  kb_layout = us
    kb_variant =
    kb_model =
    kb_options = caps:none
    kb_options = caps:super
    kb_rules =

    follow_mouse = 1

    sensitivity = -0.1

    touchpad {
      disable_while_typing = true
        natural_scroll = true
    }
  force_no_accel = 0
}

gestures {
# workspace_swipe = true
}

device {
  name = epic-mouse-v1
    sensitivity = -0.5
}

xwayland {
  force_zero_scaling = true
}

misc {
  force_default_wallpaper = -1
    disable_hyprland_logo = true
    disable_splash_rendering  = false
}

####################
### KEYBINDINGSS ###
####################
binds {
  workspace_back_and_forth = true
    allow_workspace_cycles = true
}

$mainMod = SUPER
bind = $mainMod, T, exec, $terminal
bind = $mainMod ,B, exec, $browser
bind = $mainMod, W, killactive
bind = $mainMod, V, togglefloating
bind = $mainMod, F, fullscreen, 1
bind = $mainMod, G, fullscreen, 0
# bind = $mainMod, N, exec, [float; size 800 400] ~/.config/nvim-wl-anywhere/nvim-wl-anywhere.sh
bind = $mainMod, O,exec, $note

bind = $mainMod_Shift, E, exec, $OCR4Linux_ENG # OCR4Linux with interactive selection

#Yazi File Manager
bind = $mainMod, E, exec, $terminal -e $fileManager
#Rofi Powermenu
bind = $mainMod, P, exec, ~/.config/rofi/powermenu/powermenu.sh
#Rofi Launcher
bind = $mainMod, Space, exec, ~/.config/rofi/launcher/launcher.sh
bind = $mainMod_Shift, R, exec, ~/.config/rofi/wallselect/script.sh && hyprpaper


#Grim & Slurp  for Screenshot
bind = $mainMod_Shift, S, exec, slurp | grim -g - /tmp/photo.png && wl-copy --type image/png < /tmp/photo.png && notify-send -w 'Screenshot' 'Screenshot Copied to Clipboard' -i /tmp/photo.png
bind = $mainMod_Shift, l, exec, sh -c ~/work/side/vim-screenshot/vim-screenshot && sleep 1 && wl-copy --type image/png < /tmp/photo.png  && notify-send -w 'Screenshot' 'Screenshot copied to clipboard' -i /tmp/photo.png
# bind = , PRINT, exec, grimblast copysave area
bind = Alt+Shift, S, exec, grim -g "$(slurp)" $HOME/Pictures/Screenshot/$(date +'%m-%d-%H-%M-%S').png && notify-send 'Screenshot Saved' -i $HOME/Pictures/Screenshot/$(date +'%m-%d-%H-%M-%S').png
# bind = Alt+Shift, S, exec, ~/work/main/dotsh/omarchy/screenshot

bind = Alt+Shift, W, exec, pkill -9 waybar ||  waybar &

#Task Manager
bind = Ctrl_Shift, Tab, exec, $terminal -e $taskManager

bind = Alt, Tab , cyclenext
#ColorPicker
bind = $mainMod, C, exec, $colorpicker -a

bind = $mainMod, I, exec, ~/.config/waybar/scripts/change-wallpaper.sh && hyprpaper
# bind = $mainMod, I, exec, ~/.local/bin/search.sh
bind = $mainMod, M, exec, ~/.config/rofi/clipboard/launcher.sh

# bind = $mainMod, L, exec, hyprlock

#Volume Control
binde = , xf86audioraisevolume, exec, pamixer -i 2 && ~/.local/bin/volume.sh
binde = , xf86audiolowervolume, exec, pamixer -d 2 && ~/.local/bin/volume.sh
binde = , xf86AudioMute, exec, pamixer -t && dunstify -i ~/.config/dunst/assets/$(pamixer --get-mute | grep -q "true" && echo "volume-mute.svg" || echo "volume.svg") -t 500 -r 2593 "Toggle Mute"


#Player Control
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioNext, exec, playerctl next

#Brightness Control
binde = , XF86MonBrightnessDown,exec,brightnessctl set 2%- &&  ~/.local/bin/brightness.sh
binde = , XF86MonBrightnessUp,exec,brightnessctl set +2% && ~/.local/bin/brightness.sh


# bind = Alt, Tab , cyclenext
bind = $mainMod, Tab, bringactivetotop,
     bind = Alt Shift, Tab, cyclenext, prev


     bind = $mainMod, A, exec,bash  ~/.config/rofi/wifi/wifi.sh

     bind = $mainMod, h, movefocus, l
     bind = $mainMod, l, movefocus, r
     bind = $mainMod, k, movefocus, u
     bind = $mainMod, j, movefocus, d

# My recommendation
     bind = $mainMod, 0, workspace, 1
     bind = $mainMod, 9, workspace, 2
     bind = $mainMod, 8, workspace, 3
     bind = $mainMod, 7, workspace, 4

# Normal
     bind = $mainMod, 1, workspace, 1
     bind = $mainMod, 2, workspace, 2
     bind = $mainMod, 3, workspace, 3
     bind = $mainMod, 4, workspace, 4
     bind = $mainMod, 5, workspace, 5
     bind = $mainMod, 6, workspace, 6

# Move active window to a workspace with mainMod + SHIFT + [0-9]
     bind = $mainMod SHIFT, 1, movetoworkspace, 1
     bind = $mainMod SHIFT, 2, movetoworkspace, 2
     bind = $mainMod SHIFT, 3, movetoworkspace, 3
     bind = $mainMod SHIFT, 4, movetoworkspace, 4
     bind = $mainMod SHIFT, 5, movetoworkspace, 5
     bind = $mainMod SHIFT, 6, movetoworkspace, 6
     bind = $mainMod SHIFT, 7, movetoworkspace, 7
     bind = $mainMod SHIFT, 8, movetoworkspace, 8
     bind = $mainMod SHIFT, 9, movetoworkspace, 9
     bind = $mainMod SHIFT, 0, movetoworkspace, 10


# Example special workspace (scratchpad)
# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, E, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
     bind = $mainMod, mouse_down, workspace, e+1
     bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
     bindm = $mainMod, mouse:272, movewindow
     bindm = $mainMod, mouse:273, resizewindow

